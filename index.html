<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phili</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Nunito:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1a1520;
  --card: #221d2e;
  --border: #332a44;
  --text: #ede8f5;
  --muted: #8a7fa0;
  --accent: #b08aff;
  --accent2: #ff8ac0;
  --glow: rgba(176,138,255,0.18);
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background-image:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(176,138,255,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 10% 100%, rgba(255,138,192,0.05) 0%, transparent 60%);
}
.container {
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
}
.stage {
  width: 280px;
  height: 320px;
  position: relative;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.glow-bg {
  position: absolute;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  width: 200px; height: 200px;
  border-radius: 50%;
  background: var(--glow);
  filter: blur(40px);
  opacity: 0.4;
  transition: opacity 0.4s;
}
.avatar-svg-wrap {
  position: relative;
  width: 240px;
  height: 300px;
  animation: breathe 4s ease-in-out infinite;
  transform-origin: bottom center;
}
@keyframes breathe {
  0%,100% { transform: scaleY(1) translateY(0); }
  50%      { transform: scaleY(1.012) translateY(-3px); }
}
.head-group {
  animation: headFloat 6s ease-in-out infinite;
  transform-origin: center bottom;
  transform-box: fill-box;
}
@keyframes headFloat {
  0%,100% { transform: rotate(0deg) translateY(0); }
  25%      { transform: rotate(0.8deg) translateY(-1px); }
  75%      { transform: rotate(-0.5deg) translateY(1px); }
}
.status-badge {
  position: absolute;
  bottom: -8px; left: 50%;
  transform: translateX(-50%);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 16px;
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
  transition: all 0.3s;
}
.status-badge.listening { color: #ff8ac0; border-color: #ff8ac0; }
.status-badge.talking   { color: #b08aff; border-color: #b08aff; }
.status-badge.thinking  { color: #ffcc80; border-color: #ffcc80; }
.bubble-area {
  width: 100%;
  min-height: 72px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.bubble {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 16px 22px;
  font-size: 0.95rem;
  line-height: 1.65;
  font-weight: 300;
  color: var(--text);
  text-align: center;
  max-width: 100%;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn {
  from { opacity:0; transform: scale(0.94) translateY(8px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}
.dots { display:flex; gap:6px; justify-content:center; padding:6px 0; }
.dot  {
  width:8px; height:8px; border-radius:50%;
  background: var(--muted);
  animation: dotBounce 1.1s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay:.18s; }
.dot:nth-child(3) { animation-delay:.36s; }
@keyframes dotBounce {
  0%,60%,100% { transform:translateY(0); opacity:.4; }
  30%          { transform:translateY(-7px); opacity:1; }
}
.input-row {
  width: 100%;
  display: flex;
  gap: 10px;
  align-items: center;
}
.inp {
  flex: 1;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 50px;
  padding: 14px 20px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.92rem;
  font-weight: 300;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(176,138,255,0.12); }
.inp::placeholder { color: var(--muted); }
.btn {
  width: 50px; height: 50px;
  border-radius: 50%; border: none;
  cursor: pointer;
  display: flex; align-items:center; justify-content:center;
  transition: all 0.2s; flex-shrink: 0;
}
.btn-send { background: var(--accent); color: #1a1520; box-shadow: 0 4px 18px rgba(176,138,255,0.35); }
.btn-send:hover  { transform:scale(1.07); }
.btn-send:disabled { opacity:.35; cursor:not-allowed; transform:none; }
.btn-mic { background: var(--card); color: var(--muted); border: 1.5px solid var(--border); }
.btn-mic:hover { border-color: #ff8ac0; color: #ff8ac0; }
.btn-mic.rec { background: rgba(255,80,80,.12); border-color: #ff5555; color: #ff5555; animation: recPulse 1s ease-in-out infinite; }
@keyframes recPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,85,85,0.4); }
  50%      { box-shadow: 0 0 0 8px rgba(255,85,85,0); }
}
.hint { font-size: 0.73rem; color: var(--muted); text-align: center; font-weight: 300; }
.err-toast {
  position:fixed; bottom:20px; left:50%;
  transform: translateX(-50%) translateY(16px);
  background: #2a0a0a; border:1px solid #ff5555;
  color: #ff9999; border-radius:10px;
  padding: 9px 18px; font-size:.78rem;
  opacity:0; transition:all .3s; pointer-events:none; white-space:nowrap;
}
.err-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="container">
  <div class="stage">
    <div class="glow-bg" id="glowBg"></div>
    <svg class="avatar-svg-wrap" id="avatarSvg" viewBox="0 0 240 300" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="skinG" cx="45%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#ffe0c8"/>
          <stop offset="100%" stop-color="#d4956a"/>
        </radialGradient>
        <radialGradient id="hairG" cx="40%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#6b3a1f"/>
          <stop offset="100%" stop-color="#3a1a08"/>
        </radialGradient>
        <radialGradient id="irisG" cx="35%" cy="30%" r="65%">
          <stop offset="0%" stop-color="#7ab8e8"/>
          <stop offset="100%" stop-color="#2a6090"/>
        </radialGradient>
        <filter id="softBlur"><feGaussianBlur stdDeviation="0.8"/></filter>
      </defs>
      <!-- BODY -->
      <path d="M 30 300 Q 20 240 50 210 Q 80 195 120 192 Q 160 195 190 210 Q 220 240 210 300 Z" fill="#4a3060"/>
      <rect x="104" y="185" width="32" height="30" rx="8" fill="url(#skinG)"/>
      <ellipse cx="120" cy="215" rx="22" ry="6" fill="rgba(0,0,0,0.15)"/>
      <!-- HEAD GROUP -->
      <g class="head-group" id="headGroup">
        <ellipse cx="120" cy="200" rx="36" ry="10" fill="rgba(0,0,0,0.2)" filter="url(#softBlur)"/>
        <ellipse cx="120" cy="130" rx="68" ry="78" fill="url(#skinG)"/>
        <ellipse cx="52" cy="132" rx="10" ry="14" fill="#d4956a"/>
        <ellipse cx="188" cy="132" rx="10" ry="14" fill="#d4956a"/>
        <ellipse cx="52" cy="132" rx="6" ry="9" fill="#c8845a"/>
        <ellipse cx="188" cy="132" rx="6" ry="9" fill="#c8845a"/>
        <!-- HAIR -->
        <ellipse cx="120" cy="68" rx="72" ry="52" fill="url(#hairG)"/>
        <path d="M 50 90 Q 45 140 48 170 Q 52 185 58 188 Q 52 160 56 120 Q 58 100 65 88 Z" fill="#3a1a08"/>
        <path d="M 190 90 Q 195 140 192 170 Q 188 185 182 188 Q 188 160 184 120 Q 182 100 175 88 Z" fill="#3a1a08"/>
        <ellipse cx="120" cy="155" rx="50" ry="30" fill="rgba(180,100,60,0.08)" filter="url(#softBlur)"/>
        <!-- BROWS -->
        <path id="browL" d="M 78 103 Q 92 97 104 101" stroke="#5a2a10" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path id="browR" d="M 136 101 Q 148 97 162 103" stroke="#5a2a10" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <!-- EYE LEFT -->
        <g id="eyeL">
          <ellipse cx="91" cy="118" rx="14" ry="11" fill="white"/>
          <ellipse cx="91" cy="118" rx="9" ry="9" fill="url(#irisG)"/>
          <ellipse cx="91" cy="118" rx="5" ry="5" fill="#0a1820"/>
          <ellipse cx="87" cy="114" rx="2.5" ry="2.5" fill="white" opacity="0.9"/>
          <rect id="blinkL" x="77" y="107" width="28" height="13" rx="4" fill="#d4956a" opacity="0"/>
        </g>
        <!-- EYE RIGHT -->
        <g id="eyeR">
          <ellipse cx="149" cy="118" rx="14" ry="11" fill="white"/>
          <ellipse cx="149" cy="118" rx="9" ry="9" fill="url(#irisG)"/>
          <ellipse cx="149" cy="118" rx="5" ry="5" fill="#0a1820"/>
          <ellipse cx="145" cy="114" rx="2.5" ry="2.5" fill="white" opacity="0.9"/>
          <rect id="blinkR" x="135" y="107" width="28" height="13" rx="4" fill="#d4956a" opacity="0"/>
        </g>
        <!-- NOSE -->
        <ellipse cx="113" cy="153" rx="5" ry="3.5" fill="rgba(150,80,40,0.22)"/>
        <ellipse cx="127" cy="153" rx="5" ry="3.5" fill="rgba(150,80,40,0.22)"/>
        <path d="M 113 150 Q 120 155 127 150" stroke="rgba(150,80,40,0.35)" stroke-width="1.5" fill="none"/>
        <!-- CHEEKS -->
        <ellipse cx="80" cy="148" rx="14" ry="9" fill="rgba(220,120,100,0.18)" filter="url(#softBlur)"/>
        <ellipse cx="160" cy="148" rx="14" ry="9" fill="rgba(220,120,100,0.18)" filter="url(#softBlur)"/>
        <!-- MOUTH -->
        <path id="mouthShape" d="M 101 170 Q 110 165 120 165 Q 130 165 139 170 Q 130 178 120 179 Q 110 178 101 170 Z" fill="#c06060"/>
        <path d="M 101 170 Q 108 166 114 167 Q 120 165 126 167 Q 132 166 139 170 Q 130 168 120 169 Q 110 168 101 170 Z" fill="#a04040" opacity="0.6"/>
        <ellipse id="mouthOpen" cx="120" cy="173" rx="10" ry="2" fill="#3a1520" opacity="0"/>
      </g>
    </svg>
    <div class="status-badge" id="statusBadge">Bereit</div>
  </div>

  <div class="bubble-area" id="bubbleArea"></div>

  <div style="width:100%;display:flex;flex-direction:column;gap:10px;align-items:center;">
    <div class="input-row">
      <button class="btn btn-mic" id="micBtn" onclick="toggleMic()">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
        </svg>
      </button>
      <input type="text" class="inp" id="textInp" placeholder="Schreib Phili etwas…" onkeydown="if(event.key==='Enter')send()">
      <button class="btn btn-send" id="sendBtn" onclick="send()">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </div>
    <div class="hint">Tippe oder nutze das Mikrofon</div>
  </div>
</div>
<div class="err-toast" id="errToast"></div>

<script>
const CHAT='https://mkpitconsulting.app.n8n.cloud/webhook/973a921e-e48b-464c-9623-38875d319574/chat';
const TTS='https://mkpitconsulting.app.n8n.cloud/webhook/phili-tts';
const badge=document.getElementById('statusBadge');
const bubbleArea=document.getElementById('bubbleArea');
const micBtn=document.getElementById('micBtn');
const sendBtn=document.getElementById('sendBtn');
const textInp=document.getElementById('textInp');
const glowBg=document.getElementById('glowBg');
const blinkL=document.getElementById('blinkL');
const blinkR=document.getElementById('blinkR');
const mouthOpen=document.getElementById('mouthOpen');
let busy=false,recognition=null,isRec=false,audioEl=null,lipInterval=null;

function setState(s){
  badge.className='status-badge '+(s!=='idle'?s:'');
  const labels={idle:'Bereit',listening:'Zuhört…',thinking:'Denkt…',talking:'Spricht…'};
  badge.textContent=labels[s]||'';
  glowBg.style.opacity=s==='talking'?'1':s==='listening'?'0.7':'0.4';
  const bL=document.getElementById('browL'),bR=document.getElementById('browR');
  if(s==='thinking'){bL.setAttribute('d','M 78 100 Q 92 95 104 99');bR.setAttribute('d','M 136 99 Q 148 95 162 100');}
  else if(s==='listening'){bL.setAttribute('d','M 78 106 Q 92 99 104 103');bR.setAttribute('d','M 136 103 Q 148 99 162 106');}
  else{bL.setAttribute('d','M 78 103 Q 92 97 104 101');bR.setAttribute('d','M 136 101 Q 148 97 162 103');}
}

function blink(){
  blinkL.style.transition=blinkR.style.transition='opacity 0.06s';
  blinkL.style.opacity=blinkR.style.opacity='1';
  setTimeout(()=>{blinkL.style.opacity=blinkR.style.opacity='0';},120);
}
(function scheduleBlink(){setTimeout(()=>{blink();scheduleBlink();},2500+Math.random()*4000);})();

function startLips(){
  let open=false;
  lipInterval=setInterval(()=>{
    open=!open;
    mouthOpen.style.transition='opacity 0.09s';
    mouthOpen.style.opacity=open?(0.4+Math.random()*0.6).toString():'0';
    mouthOpen.setAttribute('ry',(1.5+Math.random()*5).toString());
  },100+Math.random()*80);
}
function stopLips(){
  if(lipInterval){clearInterval(lipInterval);lipInterval=null;}
  mouthOpen.style.opacity='0';
}

function showBubble(txt){
  const d=document.createElement('div');d.className='bubble';d.textContent=txt;
  bubbleArea.innerHTML='';bubbleArea.appendChild(d);
}
function showThinking(){
  bubbleArea.innerHTML='<div class="bubble"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
}

async function speak(text){
  if(audioEl){audioEl.pause();audioEl=null;}
  setState('talking');startLips();
  try{
    const r=await fetch(TTS,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,voice:'alloy'})});
    if(!r.ok)throw new Error('TTS '+r.status);
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    audioEl=new Audio(url);
    audioEl.onended=()=>{stopLips();setState('idle');URL.revokeObjectURL(url);busy=false;};
    audioEl.onerror=()=>{stopLips();setState('idle');busy=false;};
    await audioEl.play();
  }catch(e){
    stopLips();setState('idle');busy=false;
    const u=new SpeechSynthesisUtterance(text);u.lang='de-DE';speechSynthesis.speak(u);
  }
}

async function send(txt){
  if(busy)return;
  const msg=(txt||textInp.value).trim();if(!msg)return;
  textInp.value='';busy=true;sendBtn.disabled=true;
  setState('thinking');showThinking();
  try{
    const r=await fetch(CHAT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chatInput:msg,sessionId:'phili-'+Date.now()})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    const reply=j.output||j.reply||j.response||j.message||JSON.stringify(j);
    showBubble(reply);await speak(reply);
  }catch(e){setState('idle');busy=false;showErr('Fehler: '+e.message);}
  sendBtn.disabled=false;
}

function toggleMic(){
  if(busy)return;
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){showErr('Kein Mikrofon');return;}
  if(isRec){recognition?.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.lang='de-DE';recognition.interimResults=false;
  recognition.onstart=()=>{isRec=true;micBtn.classList.add('rec');setState('listening');};
  recognition.onresult=e=>{textInp.value=e.results[0][0].transcript;};
  recognition.onend=()=>{isRec=false;micBtn.classList.remove('rec');if(textInp.value.trim())send(textInp.value.trim());else setState('idle');};
  recognition.onerror=e=>{isRec=false;micBtn.classList.remove('rec');setState('idle');if(e.error!=='no-speech')showErr('Mic: '+e.error);};
  recognition.start();
}

function showErr(msg){
  const t=document.getElementById('errToast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}

window.addEventListener('load',async()=>{
  setState('thinking');showThinking();
  try{
    const r=await fetch(CHAT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chatInput:'Begrüße den Nutzer kurz und herzlich auf Deutsch als Phili.',sessionId:'init-'+Date.now()})});
    const j=await r.json();
    const g=j.output||j.reply||'Hallo! Ich bin Phili. Wie kann ich helfen?';
    showBubble(g);await speak(g);
  }catch(e){showBubble('Hallo! Ich bin Phili. Wie kann ich dir helfen?');setState('idle');busy=false;}
});
</script>
</body>
</html>
