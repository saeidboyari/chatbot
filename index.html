<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phili</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --card: #161b22; --border: #21262d;
  --text: #e6edf3; --muted: #6e7681;
  --accent: #58a6ff; --accent2: #ffa657;
}
body {
  background: var(--bg); color: var(--text);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 16px;
  background-image: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(88,166,255,0.07) 0%, transparent 70%);
}
.container { width:100%; max-width:460px; display:flex; flex-direction:column; align-items:center; gap:20px; }

.avatar-frame {
  position:relative; width:320px; height:400px; border-radius:24px; overflow:hidden;
  background:linear-gradient(160deg,#141a28 0%,#0a0f1a 100%);
  border:1px solid var(--border);
  box-shadow:0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(88,166,255,0.06);
}
#avatarCanvas { width:100%!important; height:100%!important; display:block; }
#loadOverlay {
  position:absolute; inset:0;
  background:linear-gradient(160deg,#141a28 0%,#0a0f1a 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
  transition:opacity 0.8s; z-index:10;
}
#loadOverlay.hidden { opacity:0; pointer-events:none; }
.spinner { width:44px; height:44px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.load-txt { color:var(--muted); font-size:0.78rem; letter-spacing:0.08em; }
.nametag {
  position:absolute; top:14px; left:50%; transform:translateX(-50%);
  background:rgba(10,15,26,0.75); backdrop-filter:blur(8px);
  border:1px solid var(--border); border-radius:20px; padding:4px 16px;
  font-size:0.82rem; font-weight:600; color:var(--accent); pointer-events:none; z-index:5;
}
.badge {
  position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
  background:rgba(10,15,26,0.8); backdrop-filter:blur(8px);
  border:1px solid var(--border); border-radius:20px; padding:4px 14px;
  font-size:0.68rem; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--muted); white-space:nowrap; transition:all 0.3s; pointer-events:none; z-index:5;
}
.badge.listening { color:var(--accent2); border-color:var(--accent2); }
.badge.talking   { color:var(--accent); border-color:var(--accent); }
.badge.thinking  { color:#7ee787; border-color:#7ee787; }

.bubble-area { width:100%; min-height:64px; display:flex; align-items:center; justify-content:center; }
.bubble {
  background:var(--card); border:1px solid var(--border); border-radius:16px;
  padding:14px 20px; font-size:0.92rem; line-height:1.6; font-weight:300;
  color:var(--text); text-align:center; max-width:100%;
  animation:popIn 0.28s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn { from{opacity:0;transform:scale(0.93) translateY(8px);} to{opacity:1;transform:scale(1) translateY(0);} }
.dots { display:flex; gap:6px; justify-content:center; padding:4px 0; }
.dot { width:8px; height:8px; border-radius:50%; background:var(--muted); animation:dotB 1.1s ease-in-out infinite; }
.dot:nth-child(2){animation-delay:.2s;} .dot:nth-child(3){animation-delay:.4s;}
@keyframes dotB { 0%,60%,100%{transform:translateY(0);opacity:.3;} 30%{transform:translateY(-7px);opacity:1;} }

.input-row { width:100%; display:flex; gap:10px; align-items:center; }
.inp {
  flex:1; background:var(--card); border:1.5px solid var(--border); border-radius:50px;
  padding:13px 20px; font-family:'Nunito',sans-serif; font-size:0.9rem; font-weight:300;
  color:var(--text); outline:none; transition:border-color .2s,box-shadow .2s;
}
.inp:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(88,166,255,0.1); }
.inp::placeholder { color:var(--muted); }
.btn { width:48px; height:48px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; }
.btn-send { background:var(--accent); color:var(--bg); box-shadow:0 4px 16px rgba(88,166,255,0.3); }
.btn-send:hover { transform:scale(1.08); }
.btn-send:disabled { opacity:.3; cursor:not-allowed; transform:none; }
.btn-mic { background:var(--card); color:var(--muted); border:1.5px solid var(--border); }
.btn-mic:hover { border-color:var(--accent2); color:var(--accent2); }
.btn-mic.rec { background:rgba(255,80,80,.1); border-color:#ff5555; color:#ff5555; animation:recP 1s ease-in-out infinite; }
@keyframes recP { 0%,100%{box-shadow:0 0 0 0 rgba(255,85,85,.4);}50%{box-shadow:0 0 0 8px rgba(255,85,85,0);} }
.hint { font-size:.72rem; color:var(--muted); text-align:center; }
.err-toast {
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%) translateY(14px);
  background:#1a0808; border:1px solid #ff5555; color:#ff9999;
  border-radius:10px; padding:8px 16px; font-size:.75rem;
  opacity:0; transition:all .3s; pointer-events:none; white-space:nowrap;
}
.err-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="container">
  <div class="avatar-frame" id="avatarFrame">
    <canvas id="avatarCanvas"></canvas>
    <div id="loadOverlay">
      <div class="spinner"></div>
      <div class="load-txt" id="loadTxt">Phili lädt…</div>
    </div>
    <div class="nametag">Phili</div>
    <div class="badge" id="badge">Bereit</div>
  </div>
  <div class="bubble-area" id="bubbleArea"></div>
  <div style="width:100%;display:flex;flex-direction:column;gap:10px;align-items:center;">
    <div class="input-row">
      <button class="btn btn-mic" id="micBtn" onclick="toggleMic()">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
        </svg>
      </button>
      <input type="text" class="inp" id="textInp" placeholder="Schreib Phili etwas…" onkeydown="if(event.key==='Enter')send()">
      <button class="btn btn-send" id="sendBtn" onclick="send()">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </div>
    <div class="hint">Tippe oder nutze das Mikrofon</div>
  </div>
</div>
<div class="err-toast" id="errToast"></div>

<!-- Three.js classic (UMD) build - no module needed -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── CONFIG ──
const CHAT = 'https://mkpitconsulting.app.n8n.cloud/webhook/973a921e-e48b-464c-9623-38875d319574/chat';
const TTS  = 'https://mkpitconsulting.app.n8n.cloud/webhook/phili-tts';

// ── UI refs ──
const badge      = document.getElementById('badge');
const bubbleArea = document.getElementById('bubbleArea');
const micBtn     = document.getElementById('micBtn');
const sendBtn    = document.getElementById('sendBtn');
const textInp    = document.getElementById('textInp');
const loadOv     = document.getElementById('loadOverlay');
const loadTxt    = document.getElementById('loadTxt');
const frame      = document.getElementById('avatarFrame');
const canvas     = document.getElementById('avatarCanvas');

let busy=false, recognition=null, isRec=false, audioEl=null, lipInterval=null;
let mixer=null, clock=null, avatarScene=null, morphMeshes=[], headBone=null;
let talkIntensity=0, t=0;

// ── THREE SCENE ──
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.setClearColor(0x000000, 0);
clock = new THREE.Clock();

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(28, 320/400, 0.1, 100);

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const key = new THREE.DirectionalLight(0xb0ccff, 1.4);
key.position.set(1.5, 3, 2.5); scene.add(key);
const fill = new THREE.DirectionalLight(0xffd0a0, 0.5);
fill.position.set(-2, 1, 1); scene.add(fill);
const rim = new THREE.DirectionalLight(0x88aaff, 0.35);
rim.position.set(0, 2, -3); scene.add(rim);

function resize() {
  const w=frame.clientWidth, h=frame.clientHeight;
  renderer.setSize(w,h,false);
  camera.aspect=w/h; camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// ── GLTF LOADER (inline, no import needed) ──
// Load GLTFLoader from CDN as classic script
function loadGLTFScript(cb) {
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  s.onload = cb;
  s.onerror = () => { loadTxt.textContent='Ladefehler'; };
  document.head.appendChild(s);
}

loadGLTFScript(() => {
  const loader = new THREE.GLTFLoader();
  loader.load('./model.glb',
    (gltf) => {
      avatarScene = gltf.scene;

      // Auto-fit
      const box = new THREE.Box3().setFromObject(avatarScene);
      const size = box.getSize(new THREE.Vector3());
      const scale = 1.8 / Math.max(size.x, size.y, size.z);
      avatarScene.scale.setScalar(scale);

      const box2 = new THREE.Box3().setFromObject(avatarScene);
      const center2 = box2.getCenter(new THREE.Vector3());
      const size2 = box2.getSize(new THREE.Vector3());
      avatarScene.position.set(-center2.x, -box2.min.y, -center2.z);
      scene.add(avatarScene);

      // Camera: frame head/upper body
      const headY = size2.y * 0.78;
      camera.position.set(0, headY, headY * 1.35);
      camera.lookAt(0, headY * 0.85, 0);

      // Morph targets for lipsync
      avatarScene.traverse(obj => {
        if (obj.isMesh && obj.morphTargetDictionary) morphMeshes.push(obj);
        if (obj.isBone || obj.isObject3D) {
          const n = (obj.name||'').toLowerCase();
          if (!headBone && n.includes('head')) headBone = obj;
        }
      });

      // Animations
      if (gltf.animations?.length) {
        mixer = new THREE.AnimationMixer(avatarScene);
        mixer.clipAction(gltf.animations[0]).play();
      }

      loadOv.classList.add('hidden');
      animate();
      doGreeting();
    },
    (prog) => {
      if (prog.total > 0)
        loadTxt.textContent = 'Phili lädt… ' + Math.round(prog.loaded/prog.total*100) + '%';
    },
    (err) => {
      console.error(err);
      loadTxt.textContent = 'Fehler: ' + err.message;
    }
  );
});

// ── ANIMATION LOOP ──
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  t += delta;
  if (mixer) mixer.update(delta);
  if (avatarScene) avatarScene.rotation.y = Math.sin(t * 0.25) * 0.03;
  if (headBone) {
    headBone.rotation.x = Math.sin(t * 0.6) * 0.015 + (talkIntensity * Math.sin(t * 8) * 0.04);
    headBone.rotation.z = Math.sin(t * 0.4) * 0.01;
  }
  renderer.render(scene, camera);
}

// ── LIP SYNC ──
const VISEME_KEYS = ['mouthOpen','viseme_aa','jawOpen','Mouth_Open','open','aa','A','jawDrop','viseme_O'];
function findMorphKey(mesh) {
  if (!mesh.morphTargetDictionary) return null;
  for (const k of VISEME_KEYS) if (k in mesh.morphTargetDictionary) return k;
  return Object.keys(mesh.morphTargetDictionary).find(k => /mouth|jaw|open|aa|viseme/i.test(k)) || null;
}

function startLips() {
  talkIntensity = 1;
  const targets = morphMeshes.map(m=>({mesh:m,key:findMorphKey(m)})).filter(x=>x.key);
  if (!targets.length) return;
  let open=false;
  lipInterval = setInterval(()=>{
    open=!open;
    const val = open ? 0.3+Math.random()*0.6 : Math.random()*0.15;
    targets.forEach(({mesh,key})=>{ mesh.morphTargetInfluences[mesh.morphTargetDictionary[key]]=val; });
  }, 80+Math.random()*60);
}
function stopLips() {
  talkIntensity=0;
  if(lipInterval){clearInterval(lipInterval);lipInterval=null;}
  morphMeshes.forEach(m=>{if(m.morphTargetInfluences)m.morphTargetInfluences.fill(0);});
}

// ── STATE ──
function setState(s) {
  badge.className='badge '+(s!=='idle'?s:'');
  const lbl={idle:'Bereit',listening:'Zuhört…',thinking:'Denkt…',talking:'Spricht…'};
  badge.textContent=lbl[s]||'';
}

// ── BUBBLE ──
function showBubble(txt) {
  const d=document.createElement('div'); d.className='bubble'; d.textContent=txt;
  bubbleArea.innerHTML=''; bubbleArea.appendChild(d);
}
function showThinking() {
  bubbleArea.innerHTML='<div class="bubble"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
}

// ── TTS ──
async function speak(text) {
  if(audioEl){audioEl.pause();audioEl=null;}
  setState('talking'); startLips();
  try {
    const r=await fetch(TTS,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,voice:'fable'})});
    if(!r.ok) throw new Error('TTS '+r.status);
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    audioEl=new Audio(url);
    audioEl.onended=()=>{stopLips();setState('idle');URL.revokeObjectURL(url);busy=false;};
    audioEl.onerror=()=>{stopLips();setState('idle');busy=false;};
    await audioEl.play();
  } catch(e) {
    stopLips();setState('idle');busy=false;
    const u=new SpeechSynthesisUtterance(text);u.lang='de-DE';speechSynthesis.speak(u);
  }
}

// ── SEND ──
async function send(txt) {
  if(busy)return;
  const msg=(txt||textInp.value).trim();if(!msg)return;
  textInp.value='';busy=true;sendBtn.disabled=true;
  setState('thinking');showThinking();
  try {
    const r=await fetch(CHAT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chatInput:msg,sessionId:'phili-'+Date.now()})});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json();
    const reply=j.output||j.reply||j.response||j.message||JSON.stringify(j);
    showBubble(reply); await speak(reply);
  } catch(e){setState('idle');busy=false;showErr('Fehler: '+e.message);}
  sendBtn.disabled=false;
}

// ── MIC ──
function toggleMic() {
  if(busy)return;
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){showErr('Kein Mikrofon');return;}
  if(isRec){recognition?.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.lang='de-DE';recognition.interimResults=false;
  recognition.onstart=()=>{isRec=true;micBtn.classList.add('rec');setState('listening');};
  recognition.onresult=e=>{textInp.value=e.results[0][0].transcript;};
  recognition.onend=()=>{isRec=false;micBtn.classList.remove('rec');if(textInp.value.trim())send(textInp.value.trim());else setState('idle');};
  recognition.onerror=e=>{isRec=false;micBtn.classList.remove('rec');setState('idle');if(e.error!=='no-speech')showErr('Mic: '+e.error);};
  recognition.start();
}

// ── ERROR ──
function showErr(msg) {
  const t=document.getElementById('errToast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}

// ── GREETING ──
async function doGreeting() {
  setState('thinking');showThinking();
  try {
    const r=await fetch(CHAT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chatInput:'Begrüße den Nutzer kurz und herzlich auf Deutsch als Phili.',sessionId:'init-'+Date.now()})});
    const j=await r.json();
    const g=j.output||j.reply||'Hallo! Ich bin Phili. Wie kann ich dir helfen?';
    showBubble(g); await speak(g);
  } catch(e) {
    showBubble('Hallo! Ich bin Phili. Wie kann ich dir helfen?');
    setState('idle');busy=false;
  }
}
</script>
</body>
</html>
