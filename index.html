<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phili</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --surface: #fffdf9;
    --text: #1a1410;
    --muted: #9a8f82;
    --accent: #c17f3e;
    --accent2: #7a5c8a;
    --border: #e8e0d4;
    --shadow: rgba(90,60,20,0.08);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(193,127,62,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 100%, rgba(122,92,138,0.06) 0%, transparent 50%);
  }

  .container {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  /* ── AVATAR ── */
  .avatar-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .avatar-ring {
    width: 160px; height: 160px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--border);
    box-shadow: 0 8px 40px var(--shadow), 0 2px 8px var(--shadow);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: box-shadow 0.4s ease;
  }

  .avatar-ring.listening {
    box-shadow: 0 0 0 8px rgba(193,127,62,0.15), 0 8px 40px var(--shadow);
    animation: listenPulse 1.2s ease-in-out infinite;
  }

  .avatar-ring.talking {
    box-shadow: 0 0 0 8px rgba(122,92,138,0.15), 0 8px 40px var(--shadow);
    animation: talkPulse 0.6s ease-in-out infinite;
  }

  .avatar-ring.thinking {
    box-shadow: 0 0 0 4px rgba(193,127,62,0.1), 0 8px 40px var(--shadow);
    animation: thinkSpin 2s linear infinite;
  }

  @keyframes listenPulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(193,127,62,0.2), 0 8px 40px var(--shadow); }
    50% { box-shadow: 0 0 0 14px rgba(193,127,62,0.05), 0 8px 40px var(--shadow); }
  }

  @keyframes talkPulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(122,92,138,0.2), 0 8px 40px var(--shadow); }
    50% { box-shadow: 0 0 0 12px rgba(122,92,138,0.05), 0 8px 40px var(--shadow); }
  }

  @keyframes thinkSpin {
    from { border-color: var(--border); }
    25% { border-color: var(--accent); }
    50% { border-color: var(--border); }
    75% { border-color: var(--accent2); }
    to { border-color: var(--border); }
  }

  .avatar-face {
    width: 120px; height: 120px;
  }

  .avatar-name {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .avatar-status {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    font-weight: 300;
    text-transform: uppercase;
    min-height: 20px;
    transition: all 0.3s;
  }

  /* ── SOUNDWAVE ── */
  .soundwave {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 24px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .soundwave.active { opacity: 1; }

  .sw-bar {
    width: 3px;
    border-radius: 3px;
    background: var(--accent);
    animation: swWave 0.8s ease-in-out infinite;
  }

  .sw-bar:nth-child(1) { animation-delay: 0s; }
  .sw-bar:nth-child(2) { animation-delay: 0.1s; }
  .sw-bar:nth-child(3) { animation-delay: 0.2s; }
  .sw-bar:nth-child(4) { animation-delay: 0.3s; }
  .sw-bar:nth-child(5) { animation-delay: 0.2s; }
  .sw-bar:nth-child(6) { animation-delay: 0.1s; }
  .sw-bar:nth-child(7) { animation-delay: 0s; }

  .soundwave.talking .sw-bar { background: var(--accent2); }

  @keyframes swWave {
    0%, 100% { height: 4px; }
    50% { height: 22px; }
  }

  /* ── CHAT BUBBLE ── */
  .bubble-wrap {
    width: 100%;
    min-height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 16px 24px;
    font-size: 1rem;
    line-height: 1.6;
    color: var(--text);
    text-align: center;
    max-width: 100%;
    box-shadow: 0 2px 12px var(--shadow);
    animation: bubbleIn 0.3s ease-out;
    font-weight: 300;
  }

  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(6px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .bubble.thinking-bubble {
    display: flex;
    gap: 6px;
    align-items: center;
    padding: 20px 28px;
  }

  .think-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    animation: thinkDot 1.2s ease-in-out infinite;
  }

  .think-dot:nth-child(2) { animation-delay: 0.2s; }
  .think-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes thinkDot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── INPUT ── */
  .input-section {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }

  .input-row {
    width: 100%;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .text-input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: 14px 22px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 300;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .text-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(193,127,62,0.1), 0 2px 8px var(--shadow);
  }

  .text-input::placeholder { color: var(--muted); }

  .btn-mic, .btn-send {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .btn-send {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 16px rgba(193,127,62,0.3);
  }

  .btn-send:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(193,127,62,0.4); }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-mic {
    background: var(--surface);
    color: var(--muted);
    border: 1.5px solid var(--border);
    box-shadow: 0 2px 8px var(--shadow);
  }

  .btn-mic:hover { border-color: var(--accent); color: var(--accent); }

  .btn-mic.recording {
    background: #fff0f0;
    border-color: #e05555;
    color: #e05555;
    animation: recPulse 1s ease-in-out infinite;
  }

  @keyframes recPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(224,85,85,0.3); }
    50% { box-shadow: 0 0 0 8px rgba(224,85,85,0); }
  }

  .hint {
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
    font-weight: 300;
  }

  /* error */
  .err {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #fff0f0;
    border: 1px solid #e05555;
    color: #c0392b;
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 0.8rem;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
    pointer-events: none;
  }

  .err.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="container">

  <!-- AVATAR -->
  <div class="avatar-wrap">
    <div class="avatar-ring" id="avatarRing">
      <svg class="avatar-face" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="fg" cx="40%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#fdf6ee"/>
            <stop offset="100%" stop-color="#f0e4d0"/>
          </radialGradient>
          <radialGradient id="eg" cx="30%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#c17f3e"/>
            <stop offset="100%" stop-color="#8a5520"/>
          </radialGradient>
        </defs>
        <!-- face -->
        <ellipse cx="60" cy="65" rx="38" ry="42" fill="url(#fg)" stroke="#e8d8c0" stroke-width="1"/>
        <!-- ears -->
        <ellipse cx="22" cy="66" rx="5" ry="8" fill="#f0e4d0" stroke="#e8d8c0" stroke-width="1"/>
        <ellipse cx="98" cy="66" rx="5" ry="8" fill="#f0e4d0" stroke="#e8d8c0" stroke-width="1"/>
        <!-- hair -->
        <ellipse cx="60" cy="30" rx="40" ry="28" fill="#5a3a1a"/>
        <rect x="22" y="30" width="76" height="18" fill="#5a3a1a"/>
        <!-- eyebrows -->
        <path d="M 40 50 Q 50 46 58 49" stroke="#5a3a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M 62 49 Q 70 46 80 50" stroke="#5a3a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- eyes -->
        <ellipse cx="48" cy="60" rx="7" ry="6" fill="#fff"/>
        <ellipse cx="72" cy="60" rx="7" ry="6" fill="#fff"/>
        <ellipse cx="48" cy="60" rx="5" ry="5" fill="url(#eg)"/>
        <ellipse cx="72" cy="60" rx="5" ry="5" fill="url(#eg)"/>
        <ellipse cx="46" cy="58" rx="1.5" ry="1.5" fill="white" opacity="0.8"/>
        <ellipse cx="70" cy="58" rx="1.5" ry="1.5" fill="white" opacity="0.8"/>
        <!-- nose -->
        <path d="M 60 66 Q 55 74 58 76 Q 60 77 62 76 Q 65 74 60 66" stroke="#c8a882" stroke-width="1.2" fill="none" opacity="0.7"/>
        <!-- mouth -->
        <path id="mouth" d="M 50 84 Q 60 91 70 84" stroke="#c8a882" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- cheeks -->
        <ellipse cx="36" cy="76" rx="8" ry="5" fill="rgba(220,140,100,0.15)"/>
        <ellipse cx="84" cy="76" rx="8" ry="5" fill="rgba(220,140,100,0.15)"/>
      </svg>
    </div>

    <div class="avatar-name">Phili</div>
    <div class="avatar-status" id="statusText">Einen Moment…</div>

    <div class="soundwave" id="soundwave">
      <div class="sw-bar" style="height:4px"></div>
      <div class="sw-bar" style="height:8px"></div>
      <div class="sw-bar" style="height:14px"></div>
      <div class="sw-bar" style="height:20px"></div>
      <div class="sw-bar" style="height:14px"></div>
      <div class="sw-bar" style="height:8px"></div>
      <div class="sw-bar" style="height:4px"></div>
    </div>
  </div>

  <!-- BUBBLE -->
  <div class="bubble-wrap" id="bubbleWrap"></div>

  <!-- INPUT -->
  <div class="input-section">
    <div class="input-row">
      <button class="btn-mic" id="micBtn" onclick="toggleMic()" title="Sprechen">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
        </svg>
      </button>
      <input type="text" class="text-input" id="textInput"
        placeholder="Schreib Phili etwas…"
        onkeydown="if(event.key==='Enter') sendMessage()">
      <button class="btn-send" id="sendBtn" onclick="sendMessage()">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </div>
    <div class="hint" id="hint">Tippe oder halte das Mikrofon gedrückt</div>
  </div>
</div>

<div class="err" id="errBox"></div>

<script>
const CHAT_URL = 'https://mkpitconsulting.app.n8n.cloud/webhook/973a921e-e48b-464c-9623-38875d319574/chat';
const TTS_URL  = 'https://mkpitconsulting.app.n8n.cloud/webhook/phili-tts';

const ring      = document.getElementById('avatarRing');
const statusTxt = document.getElementById('statusText');
const bubbleWrap= document.getElementById('bubbleWrap');
const soundwave = document.getElementById('soundwave');
const micBtn    = document.getElementById('micBtn');
const sendBtn   = document.getElementById('sendBtn');
const textInput = document.getElementById('textInput');
const hint      = document.getElementById('hint');

let recognition = null;
let isRecording = false;
let currentAudio = null;
let busy = false;

// ── STATES ──
function setState(s) {
  ring.className = 'avatar-ring ' + (s !== 'idle' ? s : '');
  soundwave.className = 'soundwave' + (s === 'listening' || s === 'talking' ? ' active' : '');
  soundwave.classList.toggle('talking', s === 'talking');
  const labels = { idle:'Bereit', listening:'Zuhört…', thinking:'Denkt nach…', talking:'Spricht…' };
  statusTxt.textContent = labels[s] || '';
}

function showBubble(text, type='phili') {
  const div = document.createElement('div');
  div.className = 'bubble';
  div.textContent = text;
  bubbleWrap.innerHTML = '';
  bubbleWrap.appendChild(div);
}

function showThinking() {
  bubbleWrap.innerHTML = '<div class="bubble thinking-bubble"><div class="think-dot"></div><div class="think-dot"></div><div class="think-dot"></div></div>';
}

function showErr(msg) {
  const e = document.getElementById('errBox');
  e.textContent = msg;
  e.classList.add('show');
  setTimeout(() => e.classList.remove('show'), 3500);
}

// ── TTS ──
async function speak(text) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  setState('talking');
  try {
    const res = await fetch(TTS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, voice: 'alloy' })
    });
    if (!res.ok) throw new Error('TTS ' + res.status);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.onended = () => { setState('idle'); URL.revokeObjectURL(url); busy = false; };
    currentAudio.onerror = () => { setState('idle'); busy = false; };
    await currentAudio.play();
  } catch(e) {
    setState('idle');
    busy = false;
    // Fallback: Browser TTS
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'de-DE';
    speechSynthesis.speak(utt);
  }
}

// ── SEND ──
async function sendMessage(text) {
  if (busy) return;
  const msg = (text || textInput.value).trim();
  if (!msg) return;
  textInput.value = '';
  busy = true;
  sendBtn.disabled = true;

  setState('thinking');
  showThinking();

  try {
    const res = await fetch(CHAT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chatInput: msg, sessionId: 'phili-' + Date.now() })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    const reply = json.output || json.reply || json.response || json.message || JSON.stringify(json);
    showBubble(reply);
    await speak(reply);
  } catch(e) {
    setState('idle');
    busy = false;
    showErr('Verbindungsfehler: ' + e.message);
  }
  sendBtn.disabled = false;
}

// ── MIC ──
function toggleMic() {
  if (busy) return;
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    showErr('Spracherkennung nicht unterstützt'); return;
  }
  if (isRecording) { recognition?.stop(); return; }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'de-DE';
  recognition.interimResults = false;

  recognition.onstart = () => {
    isRecording = true;
    micBtn.classList.add('recording');
    setState('listening');
    hint.textContent = 'Spreche jetzt…';
  };

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    textInput.value = text;
  };

  recognition.onend = () => {
    isRecording = false;
    micBtn.classList.remove('recording');
    hint.textContent = 'Tippe oder halte das Mikrofon gedrückt';
    if (textInput.value.trim()) sendMessage(textInput.value.trim());
    else setState('idle');
  };

  recognition.onerror = (e) => {
    isRecording = false;
    micBtn.classList.remove('recording');
    setState('idle');
    if (e.error !== 'no-speech') showErr('Mic Fehler: ' + e.error);
  };

  recognition.start();
}

// ── INIT: Begrüßung ──
window.addEventListener('load', async () => {
  setState('thinking');
  try {
    const res = await fetch(CHAT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chatInput: 'Begrüße den Nutzer kurz und herzlich auf Deutsch als Phili.', sessionId: 'phili-init-' + Date.now() })
    });
    const json = await res.json();
    const greeting = json.output || json.reply || 'Hallo! Ich bin Phili. Wie kann ich dir helfen?';
    showBubble(greeting);
    await speak(greeting);
  } catch(e) {
    const fallback = 'Hallo! Ich bin Phili. Wie kann ich dir helfen?';
    showBubble(fallback);
    setState('idle');
    busy = false;
  }
});
</script>
</body>
</html>
