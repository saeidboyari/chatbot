<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #e8673a;
      --accent-dim: #e8673a22;
      --text: #e8e4dc;
      --text-muted: #888;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
    }

    .logo {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
    }

    header h1 { font-size: 16px; font-weight: 500; }

    .status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'IBM Plex Mono', monospace;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message {
      display: flex;
      gap: 14px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; align-self: flex-end; }
    .message.bot { align-self: flex-start; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .avatar {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .message.bot .avatar {
      background: var(--border);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .bubble {
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.7;
      max-width: 640px;
      white-space: pre-wrap;
    }

    .message.user .bubble {
      background: #1f1f1f;
      border: 1px solid var(--border);
      border-top-right-radius: 4px;
    }

    .message.bot .bubble {
      background: #161616;
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    .typing {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing span {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .input-area {
      padding: 24px 32px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      transition: border-color 0.2s;
    }

    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--text-muted); }

    #sendBtn {
      width: 46px;
      height: 46px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    #sendBtn:hover { opacity: 0.85; }
    #sendBtn:active { transform: scale(0.95); }
    #sendBtn:disabled { opacity: 0.3; cursor: not-allowed; }

    #sendBtn svg { width: 18px; height: 18px; fill: white; }

    .welcome {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .welcome h2 {
      font-size: 24px;
      font-weight: 300;
      margin-bottom: 8px;
      color: var(--text);
    }

    .welcome p { font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>

<header>
  <div class="logo">AI</div>
  <h1>Claude Chatbot</h1>
  <div class="status">
    <div class="status-dot"></div>
    online
  </div>
</header>

<div id="messages">
  <div class="welcome">
    <h2>Hallo! 👋</h2>
    <p>Ich bin dein persönlicher Claude Assistent.<br>Schreib mir etwas – ich erinnere mich an unser Gespräch!</p>
  </div>
</div>

<div class="input-area">
  <textarea id="input" placeholder="Schreib eine Nachricht... (Enter zum Senden)" rows="1"></textarea>
  <button id="sendBtn">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
  const WEBHOOK_URL = 'https://mkpitconsulting.app.n8n.cloud/webhook/bc51c164-8f86-4a1b-b200-9f2dfb96ea4f/chat';
  const SESSION_ID = 'user-' + Math.random().toString(36).substr(2, 9);

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');

  function addMessage(text, type) {
    const welcome = messagesEl.querySelector('.welcome');
    if (welcome) welcome.remove();

    const msg = document.createElement('div');
    msg.className = 'message ' + type;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = type === 'user' ? 'Du' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const msg = document.createElement('div');
    msg.className = 'message bot';
    msg.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage(text, 'user');
    showTyping();

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chatInput: text, sessionId: SESSION_ID })
      });

      const data = await res.json();
      removeTyping();

      const reply = data.output || data.text || data.message || JSON.stringify(data);
      addMessage(reply, 'bot');
    } catch (err) {
      removeTyping();
      addMessage('⚠️ Fehler: Konnte keine Verbindung herstellen.', 'bot');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
